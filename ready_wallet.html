<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ready Wallet PoC</title>
</head>
<body>
  <h1>Ready Wallet PoC</h1>
  <button id="connect">Connect</button>
  <div id="link"></div>
  <pre id="log"></pre>

  <script type="module">
    import { UniversalProvider } from 'https://esm.sh/@walletconnect/universal-provider@2.17.0';

    const log = (msg) => document.getElementById('log').textContent += msg + '\n';

    document.getElementById('connect').onclick = async () => {
      log('Loading...');

      const provider = await UniversalProvider.init({
        projectId: '2f05ae7f1116030fde2d36508f472bfb',
        metadata: {
          name: 'Starknet ID',
          url: 'https://app.starknet.id',
          description: '',
          icons: []
        }
      });

      const { uri, approval } = await provider.client.connect({
        requiredNamespaces: {
          starknet: {
            chains: ['starknet:SNMAIN'],
            methods: ['starknet_account'],
            events: ['accountsChanged']
          }
        }
      });

      log('URI ready!');

      // Tampilkan link
      document.getElementById('link').innerHTML = 
        `<a href="ready://wc?uri=${encodeURIComponent(uri)}" 
            style="font-size:20px; padding:12px; background:blue; 
                   color:white; display:block; margin:10px 0; 
                   border-radius:8px; text-align:center;">
          Buka Ready Wallet
        </a>`;

      const session = await approval();
      log('Connected!');
      log('Account: ' + session.namespaces.starknet.accounts[0]);
    };
  </script>
</body>
</html>
